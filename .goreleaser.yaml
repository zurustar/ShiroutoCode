# GoReleaser configuration for the ShiroutoCode Go core CLI.
# Docs: https://goreleaser.com
# A future VSCode extension is released by a separate pipeline (vsce/ovsx),
# not by this file — GoReleaser only handles the Go binary.
version: 2

project_name: shiroutocode

before:
  hooks:
    - go mod tidy

builds:
  - id: shiroutocode
    main: ./cmd/shiroutocode
    binary: shiroutocode
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    # Windows is excluded: run_command relies on `sh -c` and Unix process-group
    # kill (syscall.Setpgid/Kill), so the tool neither builds nor runs there yet.
    # Adding Windows support is a separate task (cmd.exe/PowerShell + kill model).
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      # Ship only the two targets that matter: Linux on Intel/AMD servers and
      # Apple Silicon Macs. Intel Macs and ARM Linux are dropped on request.
      - goos: darwin
        goarch: amd64
      - goos: linux
        goarch: arm64

archives:
  - id: shiroutocode
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}macOS{{ else }}Linux{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  draft: false
  prerelease: auto
